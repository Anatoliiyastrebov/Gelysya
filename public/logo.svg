<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="healthGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6b7d6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8c5a8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Медицинский крест (символ здоровья) -->
  <g transform="translate(5, 10)">
    <!-- Вертикальная линия -->
    <rect x="20" y="5" width="10" height="30" rx="5" fill="url(#healthGrad)"/>
    <!-- Горизонтальная линия -->
    <rect x="5" y="17.5" width="40" height="10" rx="5" fill="url(#healthGrad)"/>
    <!-- Сердце внутри -->
    <path d="M 25 15 Q 25 10, 30 10 Q 35 10, 35 15 Q 35 20, 25 30 Q 15 20, 15 15 Q 15 10, 20 10 Q 25 10, 25 15" fill="white" opacity="0.9"/>
  </g>
  
  <!-- Текст -->
  <text x="60" y="35" font-family="Georgia, serif" font-size="24" font-weight="600" fill="#4a5a4a" letter-spacing="0.5px">
    Wellness
  </text>
  <text x="60" y="50" font-family="Arial, sans-serif" font-size="12" fill="#6b7d6b" font-style="italic" letter-spacing="1px">
    ЗДОРОВЬЕ
  </text>
</svg>
